name: Publish @upspeech/i18n

# DORMANT: the package is consumed as a git dependency (GitHub Packages is blocked
# by the org billing cap). This stays for if/when the registry path is restored.
# Manual / tag-triggered only so a routine merge to main can't publish.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://npm.pkg.github.com"
          scope: "@upspeech"
      - name: Check parity
        run: npm run check
      - name: Publish if version changed
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@upspeech/i18n@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION already published, skipping."
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
